<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Assistant Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-info">
                <div class="avatar">
                    <i class="fa-solid fa-robot"></i>
                    <span class="status-dot"></span>
                </div>
                <div class="agent-details">
                    <h2>IT Assistant</h2>
                    <p>Always Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" title="Options"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </div>
        </header>

        <!-- Chat History -->
        <main class="chat-box" id="chat-box">
            <!-- Initial Greeting -->
            <div class="message bot-message">
                <div class="message-content">
                    <p>Hello! I'm your IT Assistant. How can I help you today? You can ask me about laptop issues, passwords, storage, and more.</p>
                </div>
            </div>
        </main>

        <!-- Input Area -->
        <footer class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your issue here..." autocomplete="off">
                <button id="send-btn" class="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </footer>
    </div>

    <!-- Template for typing indicator -->
    <template id="typing-template">
        <div class="message bot-message typing-indicator" id="typing-indicator">
            <div class="message-content">
                <div class="dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
